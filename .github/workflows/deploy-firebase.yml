name: Deploy Firebase

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
      FIREBASE_SERVICE_ACCOUNT_KEY_BASE64: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY_BASE64 }}
      NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
      NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
      NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID }}
      NEXT_PUBLIC_APP_NAME: ${{ secrets.NEXT_PUBLIC_APP_NAME }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build backend functions
        run: pnpm --filter backend build

      - name: Write backend runtime env for Cloud Functions
        if: env.FIREBASE_PROJECT_ID != ''
        shell: bash
        run: |
          ENV_FILE="backend/.env.${FIREBASE_PROJECT_ID}"
          {
            # Do NOT write FIREBASE_PROJECT_ID — Cloud Functions rejects FIREBASE_-prefixed
            # keys in .env. The runtime reads the project from GCLOUD_PROJECT automatically.
            [ -n "${GEMINI_API_KEY}" ] && echo "GEMINI_API_KEY=${GEMINI_API_KEY}"
            # Generation + embedding model config (must match the ingested vector dimension).
            echo "GEMINI_MODEL=gemini-2.5-flash-lite"
            echo "GEMINI_EMBEDDING_MODEL=gemini-embedding-001"
            echo "GEMINI_EMBEDDING_DIMENSION=768"
            [ -n "${SUPABASE_URL}" ] && echo "SUPABASE_URL=${SUPABASE_URL}"
            [ -n "${SUPABASE_SERVICE_ROLE_KEY}" ] && echo "SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}"
          } > "$ENV_FILE"

      - name: Prepare Firebase credentials
        shell: bash
        env:
          FIREBASE_SERVICE_ACCOUNT_KEY_BASE64: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY_BASE64 }}
        run: |
          python - <<'PY'
          import base64
          import json
          import os
          from pathlib import Path

          raw = (os.environ.get("FIREBASE_SERVICE_ACCOUNT_KEY_BASE64") or "").strip()
          if not raw:
              raise SystemExit("Missing FIREBASE_SERVICE_ACCOUNT_KEY_BASE64 secret")

          cleaned = "".join(ch for ch in raw if ch in "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/=")
          decoded = base64.b64decode(cleaned, validate=False).decode("utf-8")
          json.loads(decoded)  # Validate structure before writing credentials file.
          out = Path(os.environ["RUNNER_TEMP"]) / "gcp-sa.json"
          out.write_text(decoded, encoding="utf-8")
          PY
          echo "GOOGLE_APPLICATION_CREDENTIALS=${RUNNER_TEMP}/gcp-sa.json" >> "$GITHUB_ENV"

      # NOTE: storage requires Firebase Storage to be initialized on the project once
      # (Console → Storage → Get Started). hosting deploys the Next.js frontend.
      - name: Deploy hosting, functions, rules, and storage
        run: |
          npx firebase-tools experiments:enable webframeworks
          npx firebase-tools deploy --force --project "$FIREBASE_PROJECT_ID" --only "hosting,functions,firestore:rules,storage"
